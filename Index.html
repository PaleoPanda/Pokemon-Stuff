<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokemon Deal Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #16213e;
      --border: rgba(255,255,255,0.08);
      --accent: #f6c90e;
      --accent2: #e84393;
      --green: #00e676;
      --text: #f0f0f0;
      --muted: #888;
      --pixel: 'Silkscreen', monospace;
      --body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: var(--pixel);
      font-size: clamp(1.4rem, 4vw, 2.4rem);
      color: var(--accent);
      text-shadow: 0 0 20px rgba(246,201,14,0.4), 3px 3px 0 rgba(232,67,147,0.6);
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    header p {
      font-size: 14px;
      color: var(--muted);
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    button {
      font-family: var(--pixel);
      font-size: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 12px 28px;
      cursor: pointer;
      border-radius: 4px;
      letter-spacing: 0.05em;
      transition: transform 0.1s, box-shadow 0.1s, opacity 0.2s;
      box-shadow: 4px 4px 0 rgba(232,67,147,0.7);
      position: relative;
    }

    button:hover:not(:disabled) {
      transform: translate(-1px, -1px);
      box-shadow: 5px 5px 0 rgba(232,67,147,0.7);
    }

    button:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 rgba(232,67,147,0.7);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #status {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1.5rem;
      min-height: 20px;
    }

    #status.error {
      color: #ff6b6b;
    }

    #results {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 15px;
    }

    .deal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.35s ease both;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .deal-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-image-wrap {
      position: relative;
      height: 160px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    .card-image-placeholder {
      font-size: 48px;
      opacity: 0.15;
    }

    .discount-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--green);
      color: #000;
      font-family: var(--body);
      font-size: 13px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 4px;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
    }

    .condition-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: var(--accent);
      font-family: var(--body);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid rgba(246,201,14,0.3);
    }

    .type-badge {
      position: absolute;
      top: 36px;
      left: 10px;
      font-family: var(--body);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }

    .type-badge.auction {
      background: rgba(232,67,147,0.15);
      color: #e84393;
      border: 1px solid rgba(232,67,147,0.3);
    }

    .type-badge.buy-now {
      background: rgba(0,230,118,0.1);
      color: var(--green);
      border: 1px solid rgba(0,230,118,0.25);
    }

    .card-body {
      padding: 14px 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-name {
      font-family: var(--body);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .card-title {
      font-size: 13px;
      color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-top: 4px;
    }

    .price-current {
      font-size: 22px;
      font-weight: 600;
      color: var(--green);
    }

    .price-median {
      font-size: 13px;
      color: var(--muted);
    }

    .view-link {
      display: block;
      margin-top: auto;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      text-align: center;
      text-decoration: none;
      font-family: var(--body);
      font-size: 13px;
      font-weight: 500;
      color: var(--accent2);
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }

    .view-link:hover { color: var(--accent); }
  </style>
</head>
<body>

  <header>
    <h1>&#9889; Pokemon Deal Finder</h1>
    <p>Flags active listings 25%+ below 30-day sold median</p>
  </header>

  <div class="controls">
    <button id="refresh-btn" onclick="loadDeals()">Find Deals</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <script>
    async function loadDeals() {
      const btn = document.getElementById("refresh-btn");
      const status = document.getElementById("status");
      const container = document.getElementById("results");

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Searching...';
      status.textContent = "Fetching listings from eBay — this may take 10–20s...";
      status.className = "";
      container.innerHTML = "";

      try {
        const res = await fetch("http://localhost:3000/deals");

        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: "Server error" }));
          throw new Error(err.error || `HTTP ${res.status}`);
        }

        const raw = await res.json();
        const data = raw.filter(d => parseFloat(d.discount) <= 80);

        if (data.length === 0) {
          container.innerHTML = `<div class="empty">No deals found right now. Try again later.</div>`;
          status.textContent = "";
          return;
        }

        status.textContent = `Found ${data.length} deal${data.length === 1 ? "" : "s"}`;

        data.forEach((d, i) => {
          const div = document.createElement("div");
          div.className = "deal-card";
          div.style.animationDelay = `${i * 60}ms`;

          const imgHTML = d.thumbnail
            ? `<img src="${escapeHtml(d.thumbnail)}" alt="${escapeHtml(d.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="card-image-placeholder" style="display:none">&#127183;</div>`
            : `<div class="card-image-placeholder">&#127183;</div>`;

          div.innerHTML = `
            <div class="card-image-wrap">
              ${imgHTML}
              <div class="discount-badge">${d.discount}% OFF</div>
              <div class="condition-badge">${escapeHtml(d.condition)}</div>
              <div class="type-badge ${d.listingType === 'Auction' ? 'auction' : 'buy-now'}">${escapeHtml(d.listingType)}</div>
            </div>
            <div class="card-body">
              <div class="card-name">${escapeHtml(d.card)}</div>
              <div class="card-title">${escapeHtml(d.title)}</div>
              <div class="price-row">
                <span class="price-current">$${Number(d.price).toFixed(2)}</span>
                <span class="price-median">$${Number(d.median).toFixed(2)} median</span>
              </div>
              <a class="view-link" href="${escapeHtml(d.link)}" target="_blank" rel="noopener">View on eBay &#8599;</a>
            </div>
          `;
          container.appendChild(div);
        });

      } catch (err) {
        status.textContent = `Error: ${err.message}. Is the server running?`;
        status.className = "error";
      } finally {
        btn.disabled = false;
        btn.innerHTML = "Refresh Deals";
      }
    }

    function escapeHtml(str) {
      if (!str) return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>
